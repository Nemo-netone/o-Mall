# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
minimumReleaseAge: 1440

packages:
  - artifacts/*
  - lib/*

catalog:
  '@types/node': ^22.10.5
  'drizzle-orm': ^0.38.3
  'drizzle-zod': ^0.7.0
  'express': ^5.0.1
  'tsx': ^4.19.2
  'vite': ^6.0.11
  'zod': ^3.24.1

autoInstallPeers: false

# esbuild / better-sqlite3 需要在安装时运行构建脚本（链接对应平台二进制）。
# 注意：CloudBase 静态托管是“本地构建好再上传 dist”，构建发生在本机（Windows），
# 因此必须让 pnpm 按当前平台正常安装 esbuild 平台二进制，不要用 overrides 排除平台，
# 否则本地 `vite build` 会因缺少 esbuild 二进制而失败。
onlyBuiltDependencies:
  - esbuild
  - better-sqlite3

allowBuilds:
  esbuild: true
